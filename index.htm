<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📚 Bilingual Moral Storybook – 10 Stories English & Hindi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #1a472a;
      font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    .app-container {
      max-width: 550px;
      width: 100%;
      margin: 0 auto;
      background: #fef7e0;
      border-radius: 48px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .app-inner {
      padding: 18px 20px 24px;
      background: #fffaf0;
      border-radius: 44px;
      margin: 10px;
      box-shadow: inset 0 0 0 2px #ffefc0;
    }

    /* Cover */
    .cover-page {
      text-align: center;
      padding: 30px 16px;
      background: linear-gradient(145deg, #ffd89b, #f8a35e);
      border-radius: 40px;
      animation: float 2.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .cover-page h1 {
      font-size: 2.3rem;
      color: white;
      text-shadow: 3px 3px 0 #c25d1a;
    }
    .cover-page .big-emoji {
      font-size: 5rem;
      margin: 15px 0;
    }
    .cover-page p {
      font-size: 1.1rem;
      background: #e67e22dd;
      display: inline-block;
      padding: 8px 20px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
    }
    .start-btn {
      background: #ffb347;
      border: none;
      font-size: 1.5rem;
      padding: 12px 28px;
      border-radius: 60px;
      color: white;
      font-weight: bold;
      margin-top: 24px;
      cursor: pointer;
      box-shadow: 0 6px 0 #b45a1a;
      width: 80%;
      font-family: inherit;
    }
    .start-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #b45a1a;
    }

    /* Main App */
    .main-app {
      display: none;
    }

    .app-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 3px dotted #ffbc6e;
    }
    .app-header h2 {
      font-size: 1.2rem;
      background: linear-gradient(135deg, #e67e22, #d35400);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .controls-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .story-picker, .lang-badge, .music-toggle {
      background: #ffefcf;
      border-radius: 40px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    select, .lang-badge button, .music-btn {
      background: #ffb347;
      border: none;
      padding: 4px 10px;
      border-radius: 40px;
      font-family: inherit;
      font-weight: bold;
      color: white;
      font-size: 0.75rem;
    }
    .lang-badge button {
      background: none;
      color: #b45f1b;
    }
    .lang-badge .active-lang {
      background: #ffa559;
      color: white;
    }
    .music-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 0.9rem;
      padding: 0;
    }

    .image-panel {
      background: #fff2df;
      border-radius: 42px;
      padding: 12px;
      margin: 8px 0;
    }
    .scene-img {
      width: 100%;
      max-height: 210px;
      object-fit: contain;
      background: #fff9ed;
      border-radius: 32px;
      padding: 6px;
    }
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: #6fbf4c;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 3px 0 #367c1f;
      min-width: 100px;
      font-family: inherit;
    }
    .action-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #367c1f; }
    .read-again { background: #ff8c69; box-shadow: 0 3px 0 #b14e2a; }

    .story-card {
      background: #fffef5;
      border-radius: 40px;
      padding: 15px 18px;
      margin: 12px 0;
      box-shadow: inset 0 0 0 2px #ffe8b6;
    }
    .story-text {
      font-size: 1.05rem;
      line-height: 1.5;
      color: #2c4527;
    }
    .story-text p {
      margin: 6px 0;
    }
    .moral {
      margin-top: 12px;
      padding: 8px;
      background: #fff0cc;
      border-radius: 28px;
      font-weight: bold;
      color: #c25d1a;
      text-align: center;
    }

    .draw-panel {
      background: #fef3df;
      border-radius: 36px;
      padding: 10px;
      margin-top: 8px;
    }
    .draw-title {
      font-weight: bold;
      color: #e67e22;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    canvas {
      background: white;
      border-radius: 28px;
      display: block;
      margin: 6px auto;
      width: 100%;
      height: auto;
      cursor: crosshair;
      border: 2px solid #ffcd94;
      touch-action: none;
    }
    .draw-tools {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .draw-tool-btn {
      background: #ffb347;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      color: white;
      font-size: 0.75rem;
      box-shadow: 0 2px 0 #b45a1a;
    }
    .page-indicator {
      text-align: center;
      background: #ffecb3;
      width: fit-content;
      margin: 10px auto 4px;
      padding: 5px 20px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 0.75rem;
    }
    .auto-read-label {
      text-align: center;
      font-size: 0.65rem;
      color: #e67e22;
      margin: 5px 0;
    }
    footer {
      font-size: 0.6rem;
      text-align: center;
      color: #bc8a4a;
      margin-top: 10px;
    }
    @media (max-width: 480px) {
      .app-inner { padding: 12px 14px 18px; }
      .action-btn { padding: 8px 14px; font-size: 0.9rem; min-width: 85px; }
      .story-text { font-size: 0.95rem; }
      .app-header h2 { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="app-inner">
    <!-- Cover Screen -->
    <div id="coverScreen" class="cover-page">
      <div class="big-emoji">📚🇮🇳🇬🇧</div>
      <h1>✨ Bilingual Storybook ✨</h1>
      <p>English & हिंदी | 10 Moral Stories</p>
      <button id="openAppBtn" class="start-btn">🌟 Open App 🌟</button>
      <div style="margin-top: 15px; font-size: 0.8rem;">🎵 Draw | Listen | Learn Values</div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="main-app">
      <div class="app-header">
        <h2 id="storyTitleMain">📖 The Honest Woodcutter</h2>
        <div class="controls-row">
          <div class="story-picker">
            <span>📖</span>
            <select id="storySelect">
              <option value="0">1. Honest Woodcutter (ईमानदार लकड़हारा)</option>
              <option value="1">2. Lion & Mouse (शेर और चूहा)</option>
              <option value="2">3. Thirsty Crow (प्यासा कौआ)</option>
              <option value="3">4. Greedy Dog (लालची कुत्ता)</option>
              <option value="4">5. Ant & Dove (चींटी और कबूतर)</option>
              <option value="5">6. Kind Elephant (दयालु हाथी)</option>
              <option value="6">7. Brave Lion (बहादुर शेर)</option>
              <option value="7">8. Friendly Dragon (मित्रवत ड्रैगन)</option>
              <option value="8">9. Speedy Turtle (तेज़ कछुआ)</option>
              <option value="9">10. Rainbow Unicorn (इंद्रधनुषी गेंडा)</option>
            </select>
          </div>
          <div class="lang-badge">
            <button id="langEnBtn" class="active-lang">🇬🇧 EN</button>
            <button id="langHiBtn">🇮🇳 हिंदी</button>
          </div>
          <div class="music-toggle">
            <span>🎵</span>
            <button id="musicToggleBtn" class="music-btn">🔊</button>
          </div>
        </div>
      </div>

      <div class="image-panel">
        <img id="storyImage" class="scene-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 200'%3E%3Crect width='400' height='200' fill='%23ffe0b5'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23b97f2e' font-size='18'%3E📖%3C/text%3E%3C/svg%3E" alt="scene">
        <div class="action-buttons">
          <button id="prevBtn" class="action-btn">◀ Prev</button>
          <button id="readAgainBtn" class="action-btn read-again">🔊 Read</button>
          <button id="nextBtn" class="action-btn">Next ▶</button>
        </div>
      </div>

      <div class="story-card">
        <div class="story-text" id="storyTextBlock"></div>
        <div class="moral" id="moralBlock"></div>
      </div>

      <div class="draw-panel">
        <div class="draw-title">🎨 Draw your story scene</div>
        <canvas id="drawCanvas" width="700" height="190" style="width:100%; height:auto; aspect-ratio:700/190"></canvas>
        <div class="draw-tools">
          <button id="clearDrawBtn" class="draw-tool-btn">🧽 Clear</button>
          <button id="saveDrawBtn" class="draw-tool-btn">💾 Save PNG</button>
          <button id="colorChangeBtn" class="draw-tool-btn">🌈 Change Color</button>
        </div>
      </div>

      <div class="page-indicator" id="pageIndicatorBox">Page 1 / 6</div>
      <div class="auto-read-label">🔊 Auto-Read ON (page turns read story aloud)</div>
      <footer>✨ 10 fully bilingual stories • Moral lessons • Draw & listen ✨</footer>
    </div>
  </div>
</div>

<script>
  // ======================== 10 COMPLETE BILINGUAL STORIES (English + Hindi) ========================
  // Each story has 6 pages (4-5 lines each) with clear moral on last page.
  
  // 1. The Honest Woodcutter | ईमानदार लकड़हारा
  const woodcutterEn = [
    "🪓 A poor woodcutter was cutting wood near a river.\n💧 Suddenly, his iron axe slipped and fell into the deep water.\n😢 He sat down crying because he lost his only tool.",
    "🧚 A beautiful fairy appeared from the river.\n✨ 'Why are you sad, good man?' she asked.\n🗣️ 'I lost my axe! Now I cannot earn my bread,' he replied.",
    "🥇 The fairy showed him a shining golden axe.\n❌ 'Is this yours?' she asked.\n🙏 'No, that is not mine,' said the honest woodcutter.",
    "🥈 Then she brought a silver axe.\n❌ Again the woodcutter refused.\n💚 'No, my axe was old and made of iron,' he said.",
    "🔨 Finally, she brought his simple iron axe.\n😊 'Yes! That is mine!' he said with joy.\n🎁 The fairy rewarded him with all three axes for his honesty.",
    "🏆 The woodcutter lived happily ever after.\n🌟 Moral: Honesty is the best policy.\n✅ Always speak the truth, no matter what."
  ];
  const woodcutterHi = [
    "🪓 एक गरीब लकड़हारा नदी के किनारे लकड़ी काट रहा था।\n💧 अचानक उसकी लोहे की कुल्हाड़ी पानी में गिर गई।\n😢 वह रोने लगा क्योंकि उसका एकमात्र औज़ार खो गया।",
    "🧚 एक सुंदर परी नदी से प्रकट हुई।\n✨ 'तुम उदास क्यों हो, भले इंसान?' उसने पूछा।\n🗣️ 'मेरी कुल्हाड़ी खो गई! अब मैं रोज़ी कैसे कमाऊँ?' वह बोला।",
    "🥇 परी ने सोने की चमकती कुल्हाड़ी दिखाई।\n❌ 'क्या यह तुम्हारी है?'\n🙏 'नहीं, यह मेरी नहीं है,' ईमानदार लकड़हारा बोला।",
    "🥈 फिर उसने चांदी की कुल्हाड़ी दिखाई।\n❌ लकड़हारे ने फिर मना कर दिया।\n💚 'नहीं, मेरी कुल्हाड़ी पुरानी लोहे की थी।'",

    "🏆 लकड़हारा हमेशा खुशी से रहने लगा।\n🌟 सीख: ईमानदारी सबसे अच्छी नीति है।\n✅ हमेशा सच बोलो, चाहे कुछ भी हो।"
  ];

  // 2. The Lion and the Mouse | शेर और चूहा
  const lionMouseEn = [
    "🦁 A mighty lion was sleeping under a tree.\n🐭 A little mouse ran over his body playfully.\n😡 The lion woke up and caught the tiny mouse.",
    "🐭 'Please let me go! I will help you someday!' begged the mouse.\n😄 The lion laughed loudly at the idea of a mouse helping him.\n🤝 But he let the mouse go.",
    "🕸️ A few days later, the lion fell into a hunter's net.\n🦁 He roared with all his might but could not escape.\n😢 He was trapped and helpless.",
    "🐭 The little mouse heard the lion's roar and rushed to help.\n🦷 She started chewing the ropes with her sharp teeth.\n💪 She worked tirelessly.",
    "🕊️ Soon the ropes broke and the lion was free!\n🦁 'Thank you, little friend! You saved my life.'\n🤝 The lion realized that even a small friend can be a great help.",
    "🏆 Moral: A small friend can be a great help.\n💖 Never underestimate anyone because of their size."
  ];
  const lionMouseHi = [
    "🦁 एक शक्तिशाली शेर पेड़ के नीचे सो रहा था।\n🐭 एक छोटा चूहा उसके शरीर पर दौड़ गया।\n😡 शेर जाग गया और उसने चूहे को पकड़ लिया।",
    "🐭 'मुझे माफ कर दो! मैं कभी तुम्हारी मदद करूंगा!' चूहे ने विनती की।\n😄 शेर जोर से हंसा।\n🤝 लेकिन उसने चूहे को छोड़ दिया।",

    "🐭 छोटे चूहे ने शेर की दहाड़ सुनी और दौड़ा।\n🦷 उसने रस्सियों को कुतरना शुरू कर दिया।\n💪 उसने बिना रुके मेहनत की।",

    "🏆 सीख: छोटा दोस्त भी बड़ी मदद कर सकता है।\n💖 किसी को उनके आकार से कम मत आंकिए।"

  // 3. The Thirsty Crow | प्यासा कौआ
  const crowEn = [

  const crowHi = [
    "🐦 एक कौआ गर्मी के दिन बहुत प्यासा था।\n☀️ उसने हर जगह पानी ढूंढा लेकिन नहीं मिला।\n😩 वह हार मानने लगा।",
    "🏺 उसे एक घड़ा मिला जिसमें थोड़ा पानी था।\n😥 उसकी चोंच पानी तक नहीं पहुँच पाई।\n💡 उसने गहराई से सोचा।",

  // 4. The Greedy Dog | लालची कुत्ता
  const dogEn = [

    "😠 'मुझे वह बड़ी हड्डी भी चाहिए!' वह लालच से सोचा।\n🐕 उसने परछाई पर गुस्से से भौंका।\n🦴 जैसे ही मुँह खोला, उसकी हड्डी गिर गई।",
    "🌊 हड्डी नदी में गिर गई और हमेशा के लिए खो गई।\n😢 कुत्ते ने अपनी एकमात्र हड्डी खो दी।\n😔 उसके पास कुछ भी नहीं बचा।",

    "🏆 सीख: लालच बुरी बला है।\n🙏 जो तुम्हारे पास है, उसमें खुश रहो और लालच मत करो।"
  ];

  // 5. The Ant and the Dove | चींटी और कबूतर
  const antEn = [
    "🐜 A little ant went to drink water from a river.\n🌊 A strong wave swept her away.\n😨 She was about to drown.",
    "🕊️ A kind dove sitting on a tree saw the ant.\n🍃 She quickly plucked a leaf and dropped it into the water.\n🐜 The ant climbed onto the leaf and reached the shore safely.",

  const antHi = [

    "🐜 चींटी ने शिकारी को देखा और खतरा समझ गई।\n🦵 वह दौड़ी और शिकारी के पैर में जोर से काटा।\n😖 शिकारी दर्द से चिल्लाया और उसका निशाना चूक गया।",
    "🕊️ कबूतर ने चीख सुनी और सुरक्षित उड़ गया।\n🤝 चींटी और कबूतर अच्छे दोस्त बन गए।\n💖 उन्होंने हमेशा एक-दूसरे की मदद करने का वादा किया।",

  // 6-10: Magical stories (short & sweet, fully bilingual)
  const elephantEn = ["🐘 Chotu elephant finds a crying bird.\n💔 'I lost my nest,' she weeps.\n🤗 Chotu promises to help.", "🏗️ Friends collect twigs and leaves.\n🐒 Monkey brings fibers.\n🐿️ Squirrel brings feathers.", "🪹 They build a cozy new nest.\n🎉 The bird is overjoyed!", "🎵 The bird sings a thank you song.\n🕺 All animals dance together.", "🤝 Chotu promises kindness forever.\n💖 Friendship makes everything better.", "🌈 Moral: Kindness and friendship are true magic. 💖"];
  const elephantHi = ["🐘 छोटू हाथी ने रोती चिड़िया देखी।\n💔 'मेरा घोंसला खो गया,' वह रोई।\n🤗 छोटू ने मदद का वादा किया।", "🏗️ दोस्तों ने टहनियाँ और पत्ते जोड़े।\n🐒 बंदर ने रेशे दिए।\n🐿️ गिलहरी ने पंख लाए।", "🪹 उन्होंने एक आरामदायक घोंसला बनाया।\n🎉 चिड़िया बहुत खुश हुई!", "🎵 चिड़िया ने धन्यवाद का गीत गाया।\n🕺 सभी जानवर एक साथ नाचे।", "🤝 छोटू ने हमेशा दयालु रहने का वादा किया।\n💖 दोस्ती सब कुछ बेहतर बना देती है।", "🌈 सीख: दयालुता और दोस्ती असली जादू है। 💖"];
  
  const lion2En = ["🦁 Leo the lion cub hears a cry.\n🌿 A deer is trapped in a bush.\n👑 Leo bravely rescues the deer.", "🐘 All animals cheer for Leo.\n💖 Bravery comes from the heart.", "🌟 Moral: Be brave and help those in need.", "", "", ""];
  const lion2Hi = ["🦁 शेर का बच्चा लियो ने चीख सुनी।\n🌿 एक हिरण झाड़ी में फंस गया है।\n👑 लियो ने बहादुरी से हिरण को बचाया।", "🐘 सभी जानवरों ने लियो की प्रशंसा की।\n💖 बहादुरी दिल से आती है।", "🌟 सीख: बहादुर बनो और जरूरतमंदों की मदद करो।", "", "", ""];
  const dragonEn = ["🐉 Draco the dragon breathes rainbow fire.\n🌸 He saves a village from a big fire.", "💖 Everyone loves Draco now.\n🏆 Moral: Kindness changes hearts.", "", "", "", ""];
  const dragonHi = ["🐉 ड्रैगन ड्रेको इंद्रधनुषी आग छोड़ता है।\n🌸 वह गाँव को बड़ी आग से बचाता है।", "💖 अब सब ड्रेको से प्यार करते हैं।\n🏆 सीख: दयालुता दिल बदल देती है।", "", "", "", ""];
  const turtleEn = ["🐢 Timmy the turtle never gives up.\n🏁 He joins the jungle race against fast animals.", "🎉 With patience, he wins the race.\n🏆 Moral: Slow and steady wins the race.", "", "", "", ""];
  const turtleHi = ["🐢 कछुआ टिमी कभी हार नहीं मानता।\n🏁 वह तेज़ जानवरों के खिलाफ जंगल दौड़ में शामिल होता है।", "🎉 धैर्य से वह दौड़ जीत जाता है।\n🏆 सीख: धीरे चलो, मंजिल पाओ।", "", "", "", ""];
  const unicornEn = ["🦄 Una the unicorn has rainbow mane.\n🌈 Dark clouds cover the land and take away colors.", "✨ Una's horn brings back colors and happiness.\n🏆 Moral: Spread joy and kindness.", "", "", "", ""];
  const unicornHi = ["🦄 यूना गेंडा, इंद्रधनुषी अयाल वाला।\n🌧️ काले बादल सब ढक लेते हैं।", "✨ यूना के सींग ने रंग और खुशियाँ लौटा दीं।\n🏆 सीख: खुशी और दयालुता बांटो।", "", "", "", ""];
  
  // Fill missing pages with repeat of moral
  for(let i=2;i<6;i++) { lion2En[i] = lion2En[2]; lion2Hi[i] = lion2Hi[2]; dragonEn[i] = dragonEn[1]; dragonHi[i] = dragonHi[1]; turtleEn[i] = turtleEn[1]; turtleHi[i] = turtleHi[1]; unicornEn[i] = unicornEn[1]; unicornHi[i] = unicornHi[1]; }

  const storiesData = [
    { en: woodcutterEn, hi: woodcutterHi, titleEn: "📖 Honest Woodcutter", titleHi: "📖 ईमानदार लकड़हारा", emoji: "🪓🧚" },
    { en: lionMouseEn, hi: lionMouseHi, titleEn: "🦁 Lion & Mouse", titleHi: "🦁 शेर और चूहा", emoji: "🦁🐭" },
    { en: crowEn, hi: crowHi, titleEn: "🐦 Thirsty Crow", titleHi: "🐦 प्यासा कौआ", emoji: "🐦🏺" },
    { en: dogEn, hi: dogHi, titleEn: "🐕 Greedy Dog", titleHi: "🐕 लालची कुत्ता", emoji: "🐕🦴" },
    { en: antEn, hi: antHi, titleEn: "🐜 Ant & Dove", titleHi: "🐜 चींटी और कबूतर", emoji: "🐜🕊️" },
    { en: elephantEn, hi: elephantHi, titleEn: "🐘 Kind Elephant", titleHi: "🐘 दयालु हाथी", emoji: "🐘🌿" },
    { en: lion2En, hi: lion2Hi, titleEn: "🦁 Brave Lion", titleHi: "🦁 बहादुर शेर", emoji: "🦁🌙" },
    { en: dragonEn, hi: dragonHi, titleEn: "🐉 Friendly Dragon", titleHi: "🐉 मित्रवत ड्रैगन", emoji: "🐉🔥" },
    { en: turtleEn, hi: turtleHi, titleEn: "🐢 Speedy Turtle", titleHi: "🐢 तेज़ कछुआ", emoji: "🐢🏁" },
    { en: unicornEn, hi: unicornHi, titleEn: "🦄 Rainbow Unicorn", titleHi: "🦄 इंद्रधनुषी गेंडा", emoji: "🦄🌈" }
  ];

  function getSceneImage(storyIdx, pageNum) {
    const emoji = storiesData[storyIdx].emoji;
    const bgColors = ["#ffe6c9","#ffddbb","#ffd6b0","#ffe0b3","#fce5cd","#fff0dd","#ffe1b9","#ffefcf","#ffebc2","#ffe6d5"];
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 500 240'><rect width='500' height='240' fill='${bgColors[storyIdx%10]}' rx='35'/><text x='50%' y='45%' font-size='70' text-anchor='middle'>${emoji}</text><text x='50%' y='78%' font-size='20' fill='#8b5a2b' text-anchor='middle'>Page ${pageNum}</text></svg>`;
    return "data:image/svg+xml," + encodeURIComponent(svg);
  }

  let currentStory = 0, currentPage = 0, currentLang = "en";
  let audioCtx = null, bgInterval = null, bgEnabled = true;
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playTurnSound() { if(audioCtx && audioCtx.state!=='suspended') { const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value=880; gain.gain.setValueAtTime(0.08,audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.2); osc.start(); osc.stop(audioCtx.currentTime+0.18); } }
  function startBgMusic() { if(!audioCtx||!bgEnabled) return; if(bgInterval) clearInterval(bgInterval); function play(){ if(!bgEnabled||!audioCtx) return; const now=audioCtx.currentTime; [523,587,659,523].forEach((f,i)=>{ const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value=f; gain.gain.setValueAtTime(0.05,now+i*0.25); gain.gain.exponentialRampToValueAtTime(0.0001,now+i*0.25+0.3); osc.start(now+i*0.25); osc.stop(now+i*0.25+0.28); }); } play(); bgInterval=setInterval(play,5500); }
  function stopBgMusic() { if(bgInterval) clearInterval(bgInterval); bgInterval=null; }
  function toggleMusic() { bgEnabled=!bgEnabled; const btn=document.getElementById('musicToggleBtn'); if(bgEnabled){ btn.innerHTML='🔊'; if(audioCtx) startBgMusic(); } else { btn.innerHTML='🔇'; stopBgMusic(); } }

  function autoRead() {
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    let txt = currentLang==='en' ? storiesData[currentStory].en[currentPage] : storiesData[currentStory].hi[currentPage];
    let clean = txt.replace(/\n/g,'. ').replace(/[🪓🧚🦁🐭🐦🏺🐕🦴🐜🕊️🐘🌿🐉🔥🐢🏁🦄🌈✨💕]/g,'');
    let utter = new SpeechSynthesisUtterance(clean);
    utter.lang = currentLang==='en' ? 'en-US' : 'hi-IN';
    utter.rate=0.85; utter.pitch=1.1;
    window.speechSynthesis.speak(utter);
  }

  function updateUI() {
    const story = storiesData[currentStory];
    const text = currentLang==='en' ? story.en[currentPage] : story.hi[currentPage];
    let mainText = text.split('\n').filter(l=>!l.includes('Moral') && !l.includes('सीख')).map(l=>`<p>${l}</p>`).join('');
    let moralText = text.split('\n').find(l=>l.includes('Moral') || l.includes('सीख'));
    if(moralText) document.getElementById('moralBlock').innerHTML = `<div class="moral">✨ ${moralText} ✨</div>`;
    else document.getElementById('moralBlock').innerHTML = '';
    document.getElementById('storyTextBlock').innerHTML = mainText || `<p>${text}</p>`;
    document.getElementById('storyImage').src = getSceneImage(currentStory, currentPage+1);
    document.getElementById('storyTitleMain').innerHTML = currentLang==='en' ? story.titleEn : story.titleHi;
    document.getElementById('pageIndicatorBox').innerHTML = `📖 Page ${currentPage+1}/${story.en.length}`;
    document.getElementById('prevBtn').disabled = (currentPage===0);
    document.getElementById('nextBtn').disabled = (currentPage===story.en.length-1);
    autoRead();
  }

  function nextPage() { let max = storiesData[currentStory].en.length; if(currentPage < max-1) { currentPage++; updateUI(); playTurnSound(); } }
  function prevPage() { if(currentPage>0) { currentPage--; updateUI(); playTurnSound(); } }
  function changeStory() { currentStory = parseInt(document.getElementById('storySelect').value); currentPage=0; updateUI(); playTurnSound(); }
  function setLanguage(lang) { currentLang=lang; document.getElementById('langEnBtn').classList.toggle('active-lang', lang==='en'); document.getElementById('langHiBtn').classList.toggle('active-lang', lang==='hi'); updateUI(); }

  // Drawing canvas
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  let drawing=false, drawColor='#FF6B6B';
  function initCanvas() { canvas.width=700; canvas.height=190; ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.strokeStyle=drawColor; ctx.lineWidth=4; ctx.lineCap='round'; }
  function getCoord(e) { const rect=canvas.getBoundingClientRect(); const sx=canvas.width/rect.width; const sy=canvas.height/rect.height; let cx,cy; if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; } else { cx=e.clientX; cy=e.clientY; } let x=(cx-rect.left)*sx; let y=(cy-rect.top)*sy; x=Math.min(Math.max(0,x),canvas.width); y=Math.min(Math.max(0,y),canvas.height); return {x,y}; }
  function start(e){ drawing=true; const p=getCoord(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.5,p.y+0.5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
  function draw(e){ if(!drawing) return; e.preventDefault(); const p=getCoord(e); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
  function end(){ drawing=false; ctx.beginPath(); }
  function clearDraw(){ ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.strokeStyle=drawColor; }
  function saveDraw(){ const a=document.createElement('a'); a.download=`story_drawing.png`; a.href=canvas.toDataURL(); a.click(); }
  function changeColor(){ const cols=['#FF6B6B','#4D96FF','#FFC145','#6BCB77','#FF93AC','#9B5DE5']; drawColor=cols[Math.floor(Math.random()*cols.length)]; ctx.strokeStyle=drawColor; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',draw); canvas.addEventListener('mouseup',end); canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',draw,{passive:false}); canvas.addEventListener('touchend',end);
  document.getElementById('clearDrawBtn').addEventListener('click',clearDraw);
  document.getElementById('saveDrawBtn').addEventListener('click',saveDraw);
  document.getElementById('colorChangeBtn').addEventListener('click',changeColor);

  document.getElementById('openAppBtn').addEventListener('click',()=>{
    document.getElementById('coverScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    initAudio(); if(bgEnabled) startBgMusic();
    initCanvas(); updateUI();
  });
  document.getElementById('prevBtn').addEventListener('click',prevPage);
  document.getElementById('nextBtn').addEventListener('click',nextPage);
  document.getElementById('readAgainBtn').addEventListener('click',autoRead);
  document.getElementById('storySelect').addEventListener('change',changeStory);
  document.getElementById('langEnBtn').addEventListener('click',()=>setLanguage('en'));
  document.getElementById('langHiBtn').addEventListener('click',()=>setLanguage('hi'));
  document.getElementById('musicToggleBtn').addEventListener('click',toggleMusic);
  initCanvas();
</script>
